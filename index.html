<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortinet | Submit Complaint</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2b3e 0%, #1b4f6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .header {
            background: #0f2c3b;
            padding: 2rem 2rem 1.5rem;
            color: white;
        }
        .header h1 {
            font-size: 2rem;
        }
        .form-content {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1b4f6e;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            background: #0f2c3b;
            color: white;
            border: none;
            padding: 0.9rem;
            width: 100%;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #1b4f6e;
        }
        .alert {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 1rem;
        }
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }
        .tracking-box {
            background: #f0f9ff;
            border: 2px dashed #1b4f6e;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1rem;
            text-align: center;
        }
        .tracking-id {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0f2c3b;
            letter-spacing: 1px;
            margin: 0.5rem 0;
        }
        .footer-links {
            margin-top: 1.5rem;
            text-align: center;
        }
        .footer-links a {
            color: #1b4f6e;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Fortinet 🔒</h1>
        <p>Submit your complaint and get a tracking ID instantly</p>
    </div>
    <div class="form-content">
        <form id="complaintForm">
            <div class="form-group">
                <label>Full name *</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <select id="subject">
                    <option value="Technical Issue">Technical Issue</option>
                    <option value="Billing">Billing / Payment</option>
                    <option value="Product Feedback">Product Feedback</option>
                    <option value="Service Quality">Service Quality</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Your complaint *</label>
                <textarea id="message" placeholder="Please describe your issue..."></textarea>
            </div>
            <button type="submit" id="submitBtn">📨 Submit Complaint</button>
        </form>
        <div id="feedback"></div>
        <div class="footer-links">
            <a href="/track.html">🔍 Already have a tracking ID? Check status here</a>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('complaintForm');
    const feedbackDiv = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const subject = document.getElementById('subject').value;
        const message = document.getElementById('message').value.trim();

        if (!name || !email || !message) {
            showFeedback('Please fill in all required fields.', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
            const response = await fetch('/api/complaints', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, subject, message })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                // Show success with tracking ID
                feedbackDiv.innerHTML = `
                    <div class="alert alert-success">
                        ✅ Complaint submitted successfully!
                        <div class="tracking-box">
                            📋 <strong>SAVE THIS TRACKING ID:</strong>
                            <div class="tracking-id">${data.trackingId}</div>
                            <small>Use this ID to check your complaint status</small>
                        </div>
                    </div>
                `;
                form.reset();
            } else {
                showFeedback(data.error || 'Submission failed.', 'error');
            }
        } catch (err) {
            console.error('Error:', err);
            showFeedback('Network error. Make sure server is running on port 3000', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '📨 Submit Complaint';
        }
    });

    function showFeedback(msg, type) {
        feedbackDiv.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    }
</script>
</body>
</html>
