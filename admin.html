<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortinet Admin | Secure Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', monospace;
        }
        body {
            background: #0f2c3b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container, .admin-container {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        .login-box {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 0.75rem;
            margin: 1rem 0;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
        }
        .login-box button {
            background: #0f2c3b;
            color: white;
            padding: 0.75rem;
            width: 100%;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }
        .error {
            color: #dc2626;
            margin-top: 1rem;
        }
        .admin-header {
            background: #0f2c3b;
            color: white;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 1rem;
            flex: 1;
            text-align: center;
        }
        .complaint-card {
            background: #f8fafc;
            border-radius: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #e2e8f0;
        }
        .complaint-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .status-pending { background: #fed7aa; color: #9b4d00; }
        .status-replied { background: #c7f9cc; color: #0a5c2e; }
        .reply-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            margin: 0.5rem 0;
        }
        button {
            background: #0f2c3b;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        .delete-btn {
            background: #dc2626;
            margin-left: 0.5rem;
        }
        .search-box {
            margin-bottom: 1rem;
            padding: 0.5rem;
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
        }
        .logout-btn {
            background: #dc2626;
            padding: 0.5rem 1rem;
        }
        h2 {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    const ADMIN_PASSWORD = "FortinetAdmin2025"; // Change this to your secure password
    
    function checkAuth() {
        return sessionStorage.getItem('adminAuthenticated') === 'true';
    }
    
    function login(password) {
        if (password === ADMIN_PASSWORD) {
            sessionStorage.setItem('adminAuthenticated', 'true');
            renderAdminPanel();
            return true;
        }
        return false;
    }
    
    function logout() {
        sessionStorage.removeItem('adminAuthenticated');
        renderLogin();
    }
    
    async function fetchComplaints() {
        const res = await fetch('/api/admin/complaints');
        return await res.json();
    }
    
    async function sendReply(id, replyMessage) {
        const res = await fetch(`/api/admin/complaints/${id}/reply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ replyMessage })
        });
        if (res.ok) {
            renderAdminPanel();
        } else {
            alert('Failed to send reply');
        }
    }
    
    async function deleteComplaint(id) {
        if (!confirm('Delete this complaint permanently?')) return;
        const res = await fetch(`/api/admin/complaints/${id}`, { method: 'DELETE' });
        if (res.ok) {
            renderAdminPanel();
        } else {
            alert('Failed to delete');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function renderAdminPanel() {
        const complaints = await fetchComplaints();
        const total = complaints.length;
        const pending = complaints.filter(c => c.status === 'pending').length;
        const replied = complaints.filter(c => c.status === 'replied').length;
        
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = `
            <div class="admin-container">
                <div class="admin-header">
                    <div>
                        <h1>🔐 Fortinet Admin Panel</h1>
                        <p>Secure Complaint Management System</p>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
                
                <div class="stats">
                    <div class="stat-card">📋 Total: ${total}</div>
                    <div class="stat-card">⏳ Pending: ${pending}</div>
                    <div class="stat-card">✅ Replied: ${replied}</div>
                </div>
                
                <input type="text" id="searchInput" class="search-box" placeholder="Search by name, email, subject, or message...">
                
                <h2>All Customer Complaints</h2>
                <div id="complaintsList"></div>
            </div>
        `;
        
        const searchInput = document.getElementById('searchInput');
        const complaintsList = document.getElementById('complaintsList');
        
        function renderList() {
            const searchTerm = searchInput.value.toLowerCase();
            let filtered = complaints;
            if (searchTerm) {
                filtered = complaints.filter(c => 
                    c.name.toLowerCase().includes(searchTerm) ||
                    c.email.toLowerCase().includes(searchTerm) ||
                    c.subject.toLowerCase().includes(searchTerm) ||
                    c.message.toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                complaintsList.innerHTML = '<p style="text-align:center; padding:2rem;">No complaints found.</p>';
                return;
            }
            
            complaintsList.innerHTML = filtered.map(complaint => `
                <div class="complaint-card">
                    <div class="complaint-header">
                        <div>
                            <strong>${escapeHtml(complaint.name)}</strong> (${escapeHtml(complaint.email)})<br>
                            <small>📅 ${new Date(complaint.createdAt).toLocaleString()}</small>
                        </div>
                        <div>
                            <span class="status status-${complaint.status}">${complaint.status.toUpperCase()}</span>
                            <button class="delete-btn" onclick="deleteComplaint('${complaint.id}')">🗑️ Delete</button>
                        </div>
                    </div>
                    <div style="margin-top: 0.5rem;">
                        <strong>📌 Subject:</strong> ${escapeHtml(complaint.subject)}<br>
                        <strong>💬 Complaint:</strong>
                        <div style="background:white; padding:0.75rem; border-radius:0.5rem; margin-top:0.5rem;">
                            ${escapeHtml(complaint.message)}
                        </div>
                    </div>
                    ${complaint.reply ? `
                        <div style="background:#e6f7ff; padding:0.75rem; border-radius:0.5rem; margin-top:0.75rem;">
                            <strong>✅ Admin Reply (${complaint.repliedAt ? new Date(complaint.repliedAt).toLocaleString() : ''}):</strong><br>
                            ${escapeHtml(complaint.reply)}
                        </div>
                    ` : ''}
                    <div class="reply-section">
                        <textarea id="reply-${complaint.id}" rows="2" placeholder="Write your reply here..."></textarea>
                        <button onclick="sendReply('${complaint.id}', document.getElementById('reply-${complaint.id}').value)">✉️ Send Reply</button>
                    </div>
                </div>
            `).join('');
        }
        
        searchInput.addEventListener('input', renderList);
        renderList();
    }
    
    function renderLogin() {
        const appDiv = document.getElementById('app');
        appDiv.innerHTML = `
            <div class="login-container">
                <div class="login-box">
                    <h1>🔐 Fortinet Admin</h1>
                    <p>Secure Access Only</p>
                    <input type="password" id="password" placeholder="Enter admin password" autofocus>
                    <button onclick="attemptLogin()">Login to Dashboard</button>
                    <div id="loginError" class="error"></div>
                </div>
            </div>
        `;
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
    }
    
    window.attemptLogin = function() {
        const password = document.getElementById('password').value;
        if (login(password)) {
            document.getElementById('loginError').innerHTML = '';
        } else {
            document.getElementById('loginError').innerHTML = '❌ Invalid password. Access denied.';
        }
    };
    
    // Initialize
    if (checkAuth()) {
        renderAdminPanel();
    } else {
        renderLogin();
    }
</script>
</body>
</html>
