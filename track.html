<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Complaint - Fortinet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2b3e 0%, #1b4f6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .header {
            background: #0f2c3b;
            padding: 2rem;
            color: white;
            text-align: center;
        }
        .content {
            padding: 2rem;
        }
        .search-box {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            margin: 0.5rem 0;
        }
        button {
            background: #0f2c3b;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .complaint-details {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-pending { background: #fed7aa; color: #9b4d00; }
        .status-replied { background: #c7f9cc; color: #0a5c2e; }
        .reply-box {
            background: #e6f7ff;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.75rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #1b4f6e;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔍 Track Your Complaint</h1>
        <p>Enter the tracking ID you received</p>
    </div>
    <div class="content">
        <div class="search-box">
            <label><strong>Tracking ID</strong></label>
            <input type="text" id="trackingId" placeholder="Example: FNT-20251222-ABC123">
            <button onclick="trackComplaint()">Track Complaint</button>
        </div>
        <div id="result"></div>
        <a href="/" class="back-link">← Submit a new complaint</a>
    </div>
</div>

<script>
    async function trackComplaint() {
        const trackingId = document.getElementById('trackingId').value.trim().toUpperCase();
        const resultDiv = document.getElementById('result');
        
        if (!trackingId) {
            resultDiv.innerHTML = '<div class="alert-error">Please enter a tracking ID.</div>';
            return;
        }
        
        resultDiv.innerHTML = '<div class="loading">Loading...</div>';
        
        try {
            const response = await fetch(`/api/complaints/track/${trackingId}`);
            const data = await response.json();
            
            if (!response.ok) {
                resultDiv.innerHTML = `<div class="alert-error">${data.error || 'Complaint not found. Check your tracking ID.'}</div>`;
                return;
            }
            
            resultDiv.innerHTML = `
                <div class="complaint-details">
                    <h3>📋 Complaint Details</h3>
                    <p><strong>Tracking ID:</strong> ${data.trackingId}</p>
                    <p><strong>Status:</strong> <span class="status-badge status-${data.status}">${data.status.toUpperCase()}</span></p>
                    <p><strong>Submitted:</strong> ${new Date(data.createdAt).toLocaleString()}</p>
                    <p><strong>Subject:</strong> ${escapeHtml(data.subject)}</p>
                    <div style="background: white; padding: 1rem; border-radius: 0.5rem; margin: 1rem 0;">
                        <strong>Your Complaint:</strong><br>
                        ${escapeHtml(data.message)}
                    </div>
                    ${data.reply ? `
                        <div class="reply-box">
                            <strong>✅ Fortinet Response (${new Date(data.repliedAt).toLocaleString()}):</strong><br>
                            ${escapeHtml(data.reply)}
                        </div>
                    ` : `
                        <div class="reply-box" style="background: #fff3e0;">
                            <strong>⏳ Pending:</strong> Our team is reviewing your complaint. We'll respond within 24-48 hours.
                        </div>
                    `}
                </div>
            `;
        } catch (err) {
            console.error('Error:', err);
            resultDiv.innerHTML = '<div class="alert-error">Network error. Make sure server is running.</div>';
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('trackingId').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') trackComplaint();
    });
</script>
</body>
</html>
